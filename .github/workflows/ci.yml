name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.12.0"
          - "24.x"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check CLI executable
        run: test -x dist/src/cli.js

      - name: Demo smoke test
        run: npm run demo

      - name: Package dry run
        run: npm pack --dry-run

      - name: Packed CLI smoke test
        run: |
          set -euo pipefail
          pack_dir="$(mktemp -d)"
          install_dir="$(mktemp -d)"
          workspace_dir="$(mktemp -d)"
          npm pack --pack-destination "$pack_dir"
          npm install --prefix "$install_dir" "$pack_dir"/*.tgz
          "$install_dir/node_modules/.bin/codex-coms" --help
          "$install_dir/node_modules/.bin/codex-coms" init --agent alice --workspace "$workspace_dir"
          status_json="$("$install_dir/node_modules/.bin/codex-coms" status --workspace "$workspace_dir" --json)"
          node -e 'const status = JSON.parse(process.argv[1]); if (status.agentId !== "alice") throw new Error(`expected alice, got ${status.agentId}`); if (status.workspace !== process.argv[2]) throw new Error(`expected workspace ${process.argv[2]}, got ${status.workspace}`);' "$status_json" "$workspace_dir"
